name: ⚙️ Compile LogonDetails.exe

on:
  push:
    branches:
      - "main"
    paths:
      - "workflows/logon-details/**"
      - ".github/workflows/logon-details.yml"
  pull_request:
    branches:
      - "main"
    paths:
      - "workflows/logon-details/**"
      - ".github/workflows/logon-details.yml"

jobs:
  changes:
    name: Check for changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      build: ${{ steps.filter.outputs.build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            build:
              - './workflows/logon-details/LogonDetails.py'

  # Runs on PRs and pushes to main.
  test:
    name: Test executable
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.build == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.x"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('workflows/logon-details/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r workflows/logon-details/requirements.txt

      - name: Run tests
        run: |
          python -m pytest workflows/logon-details/tests/

  # Runs only on pushes to main conditioned by changes + tests.
  build-exe:
    name: Build executable
    runs-on: windows-latest
    needs: [changes, test]
    if: ${{ needs.changes.outputs.build == 'true' && github.event_name == 'push' && needs.test.result == 'success' }}
    concurrency:
      group: uk-controller-pack-build-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.VATSIM_UK_GITHUB_TOKEN }}

      - name: Pull latest changes
        run: git pull --ff-only

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.x"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('workflows/logon-details/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r workflows/logon-details/requirements.txt

      - name: Compile executable
        run: pyinstaller --distpath UK/ workflows/logon-details/LogonDetails.spec

      - name: Commit executable
        run: |
          git config --local user.email "privileged-access@vatsim.uk"
          git config --local user.name "VATSIM UK"
          git add UK/Configurator.exe
          git commit -m "Update Configurator.exe"
          git push
